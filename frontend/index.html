<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Store Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --danger: #dc2626;
      --success: #16a34a;
      --purple: #7c3aed;
      --gray: #6b7280;
      --bg: #f1f5f9;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    header {
      background: var(--primary);
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(37,99,235,0.3);
    }

    header h1 {
      font-size: 1.2rem;
      font-weight: 700;
      color: white;
      letter-spacing: -0.01em;
    }

    header span {
      font-size: 0.8rem;
      color: rgba(255,255,255,0.7);
    }

    main {
      max-width: 1100px;
      margin: 2rem auto;
      padding: 0 2rem;
    }

    .page-title {
      font-size: 1.4rem;
      font-weight: 700;
      margin-bottom: 1.5rem;
      color: var(--text);
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: 0 2px 8px rgba(0,0,0,0.05);
    }

    .card h2 {
      font-size: 0.95rem;
      font-weight: 600;
      margin-bottom: 1rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-row {
      display: flex;
      gap: 0.75rem;
      flex-wrap: wrap;
      align-items: center;
    }

    input[type="text"],
    input[type="number"] {
      padding: 0.6rem 0.9rem;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      font-size: 0.9rem;
      font-family: inherit;
      outline: none;
      transition: border 0.2s, box-shadow 0.2s;
      background: var(--bg);
    }

    input:focus {
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37,99,235,0.1);
      background: white;
    }

    button {
      padding: 0.6rem 1.1rem;
      border: none;
      border-radius: 8px;
      font-size: 0.85rem;
      font-family: inherit;
      font-weight: 600;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
    }

    button:active { transform: scale(0.97); }
    button:hover { opacity: 0.88; }

    .btn-primary { background: var(--primary); color: white; }
    .btn-danger { background: var(--danger); color: white; }
    .btn-purple { background: var(--purple); color: white; }
    .btn-gray { background: #e2e8f0; color: var(--text); }
    .btn-back {
      background: none;
      border: 1.5px solid var(--border);
      color: var(--muted);
      display: flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 1.25rem;
    }
    .btn-back:hover { background: var(--bg); opacity: 1; }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.9rem;
    }

    thead th {
      text-align: left;
      padding: 0.75rem 1rem;
      background: var(--bg);
      border-bottom: 1.5px solid var(--border);
      font-weight: 600;
      color: var(--muted);
      font-size: 0.78rem;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    tbody td {
      padding: 0.9rem 1rem;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      vertical-align: middle;
    }

    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover { background: #f8fafc; }

    .actions { display: flex; gap: 0.4rem; }

    .badge {
      display: inline-block;
      padding: 0.2rem 0.65rem;
      border-radius: 999px;
      font-size: 0.75rem;
      font-weight: 600;
      background: #dbeafe;
      color: var(--primary);
    }

    .empty-state {
      text-align: center;
      padding: 3rem;
      color: var(--muted);
      font-size: 0.9rem;
    }

    .hidden { display: none; }
  </style>
</head>
<body>

  <header>
    <h1>Store Management</h1>
    <span>Plataformas de Desenvolvimento 2025/26</span>
  </header>

  <main>

    <!-- STORES VIEW -->
    <div id="stores-view">
      <p class="page-title">Lojas</p>

      <div class="card">
        <h2 id="store-form-title">Nova Loja</h2>
        <div class="form-row">
          <input type="hidden" id="store-id" />
          <input type="text" id="store-name" placeholder="Nome da loja" />
          <input type="text" id="store-location" placeholder="Localização" />
          <button class="btn-primary" onclick="saveStore()">Guardar</button>
          <button class="btn-gray" onclick="resetStoreForm()">Cancelar</button>
        </div>
      </div>

      <div class="card">
        <h2>Lista de Lojas</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>Localização</th>
              <th>Criado em</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="stores-table"></tbody>
        </table>
      </div>
    </div>

    <!-- PRODUCTS VIEW -->
    <div id="products-view" class="hidden">

      <button class="btn-back" onclick="showStores()">
        &#8592; Voltar às Lojas
      </button>

      <p class="page-title" id="products-title">Produtos</p>

      <div class="card">
        <h2 id="product-form-title">Novo Produto</h2>
        <div class="form-row">
          <input type="hidden" id="product-id" />
          <input type="text" id="product-name" placeholder="Nome do produto" />
          <input type="number" id="product-price" placeholder="Preço (€)" step="0.01" />
          <input type="number" id="product-stock" placeholder="Stock" />
          <button class="btn-primary" onclick="saveProduct()">Guardar</button>
          <button class="btn-gray" onclick="resetProductForm()">Cancelar</button>
        </div>
      </div>

      <div class="card">
        <h2>Lista de Produtos</h2>
        <table>
          <thead>
            <tr>
              <th>ID</th>
              <th>Nome</th>
              <th>Preço</th>
              <th>Stock</th>
              <th>Ações</th>
            </tr>
          </thead>
          <tbody id="products-table"></tbody>
        </table>
      </div>
    </div>

  </main>

  <script>
    const API = 'http://localhost:3000';
    let currentStoreId = null;

    // ── STORES ──────────────────────────────────────────
    async function loadStores() {
      const res = await fetch(`${API}/stores`);
      const stores = await res.json();
      const tbody = document.getElementById('stores-table');
      tbody.innerHTML = stores.length === 0
        ? '<tr><td colspan="5"><div class="empty-state">Nenhuma loja encontrada. Cria a primeira loja acima.</div></td></tr>'
        : stores.map(s => `
          <tr>
            <td><span class="badge">${s.id}</span></td>
            <td><strong>${s.name}</strong></td>
            <td>${s.location || '—'}</td>
            <td>${new Date(s.created_at).toLocaleDateString('pt-PT')}</td>
            <td class="actions">
              <button class="btn-purple" onclick="showProducts(${s.id}, '${s.name}')">Produtos</button>
              <button class="btn-primary" onclick="editStore(${s.id}, '${s.name}', '${s.location}')">Editar</button>
              <button class="btn-danger" onclick="deleteStore(${s.id})">Apagar</button>
            </td>
          </tr>`).join('');
    }

    async function saveStore() {
      const id = document.getElementById('store-id').value;
      const name = document.getElementById('store-name').value;
      const location = document.getElementById('store-location').value;
      if (!name) return alert('Nome é obrigatório!');
      if (id) {
        await fetch(`${API}/stores/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, location })
        });
      } else {
        await fetch(`${API}/stores`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, location })
        });
      }
      resetStoreForm();
      loadStores();
    }

    function editStore(id, name, location) {
      document.getElementById('store-id').value = id;
      document.getElementById('store-name').value = name;
      document.getElementById('store-location').value = location;
      document.getElementById('store-form-title').textContent = 'Editar Loja';
    }

    async function deleteStore(id) {
      if (!confirm('Tens a certeza? Isto apaga também todos os produtos da loja!')) return;
      await fetch(`${API}/stores/${id}`, { method: 'DELETE' });
      loadStores();
    }

    function resetStoreForm() {
      document.getElementById('store-id').value = '';
      document.getElementById('store-name').value = '';
      document.getElementById('store-location').value = '';
      document.getElementById('store-form-title').textContent = 'Nova Loja';
    }

    // ── PRODUCTS ─────────────────────────────────────────
    function showProducts(storeId, storeName) {
      currentStoreId = storeId;
      document.getElementById('products-title').textContent = `Produtos — ${storeName}`;
      document.getElementById('stores-view').classList.add('hidden');
      document.getElementById('products-view').classList.remove('hidden');
      loadProducts();
    }

    function showStores() {
      document.getElementById('products-view').classList.add('hidden');
      document.getElementById('stores-view').classList.remove('hidden');
      resetProductForm();
      loadStores();
    }

    async function loadProducts() {
      const res = await fetch(`${API}/stores/${currentStoreId}/products`);
      const products = await res.json();
      const tbody = document.getElementById('products-table');
      tbody.innerHTML = products.length === 0
        ? '<tr><td colspan="5"><div class="empty-state">Nenhum produto encontrado. Adiciona o primeiro produto acima.</div></td></tr>'
        : products.map(p => `
          <tr>
            <td><span class="badge">${p.id}</span></td>
            <td><strong>${p.name}</strong></td>
            <td>${parseFloat(p.price).toFixed(2)} €</td>
            <td>${p.stock}</td>
            <td class="actions">
              <button class="btn-primary" onclick="editProduct(${p.id}, '${p.name}', ${p.price}, ${p.stock})">Editar</button>
              <button class="btn-danger" onclick="deleteProduct(${p.id})">Apagar</button>
            </td>
          </tr>`).join('');
    }

    async function saveProduct() {
      const id = document.getElementById('product-id').value;
      const name = document.getElementById('product-name').value;
      const price = document.getElementById('product-price').value;
      const stock = document.getElementById('product-stock').value;
      if (!name || !price) return alert('Nome e preço são obrigatórios!');
      if (id) {
        await fetch(`${API}/products/${id}`, {
          method: 'PUT',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, price, stock })
        });
      } else {
        await fetch(`${API}/stores/${currentStoreId}/products`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, price, stock })
        });
      }
      resetProductForm();
      loadProducts();
    }

    function editProduct(id, name, price, stock) {
      document.getElementById('product-id').value = id;
      document.getElementById('product-name').value = name;
      document.getElementById('product-price').value = price;
      document.getElementById('product-stock').value = stock;
      document.getElementById('product-form-title').textContent = 'Editar Produto';
    }

    async function deleteProduct(id) {
      if (!confirm('Tens a certeza?')) return;
      await fetch(`${API}/products/${id}`, { method: 'DELETE' });
      loadProducts();
    }

    function resetProductForm() {
      document.getElementById('product-id').value = '';
      document.getElementById('product-name').value = '';
      document.getElementById('product-price').value = '';
      document.getElementById('product-stock').value = '';
      document.getElementById('product-form-title').textContent = 'Novo Produto';
    }

    loadStores();
  </script>
</body>
</html>
